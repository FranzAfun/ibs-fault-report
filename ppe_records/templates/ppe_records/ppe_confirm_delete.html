{% extends "fault_logs/base.html" %}

{% block content %}

<div class="page-container">
<div class="content-container">

    <h2 class="page-title">Delete PPE Record</h2>

    <div class="info-box" style="border-left: 4px solid #dc3545;">
        <p>Are you sure you want to delete this PPE record?</p>
        <p><strong>{{ object.employee_name }}</strong> - {{ object.job_title }}</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <a href="{% url 'ppe_records:ppe-detail' object.pk %}" class="btn">
                Cancel
            </a>

            <button type="submit" class="btn" style="background:#dc3545; color:white;">
                Confirm Delete
            </button>
        </div>
    </form>

</div>
</div>
{% endblock %}
